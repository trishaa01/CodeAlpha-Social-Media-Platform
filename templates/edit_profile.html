{% extends 'base.html' %}
{% block title %}Edit Profile — Connectly{% endblock %}

{% block content %}
<div class="form-container" style="max-width:540px">
  <div class="page-header" style="margin-bottom:24px">
    <h1 class="page-title" style="font-size:26px">Edit Profile</h1>
    <p class="page-subtitle">Update your public information</p>
  </div>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <p class="form-section-title">Account Info</p>
    {{ user_form.as_p }}

    <p class="form-section-title">Profile Details</p>
    {{ profile_form.as_p }}

    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button type="submit" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
        Save Changes
      </button>
      <a href="{% url 'profile' request.user.username %}" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
