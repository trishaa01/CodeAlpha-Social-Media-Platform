{% extends 'base.html' %}

{% block content %}

<h2>Search Users</h2>

<form method="GET">

    <input
        type="text"
        name="q"
        placeholder="Search username..."
        value="{{ query }}"
    >

    <button type="submit">
        Search
    </button>

</form>

<hr>

{% if query %}

    <h3>Results</h3>

    {% for user in users %}

        <div class="user-card">

            <a href="{% url 'profile' user.username %}">

                {{ user.username }}

            </a>

        </div>

        <br>

    {% empty %}

        <p>No users found.</p>

    {% endfor %}

{% endif %}

{% endblock %}
