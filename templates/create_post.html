{% extends 'base.html' %}
{% block title %}New Post — Connectly{% endblock %}

{% block content %}
<div class="form-container" style="max-width:560px">
  <div class="page-header" style="margin-bottom:24px">
    <h1 class="page-title" style="font-size:26px">Create Post</h1>
    <p class="page-subtitle">Share something with your network</p>
  </div>

  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
      <button type="submit" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
        Publish
      </button>
      <a href="{% url 'feed' %}" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        Back to Feed
      </a>
    </div>
  </form>
</div>
{% endblock %}
